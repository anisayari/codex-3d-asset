<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex 3D Asset Viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230f1117'/%3E%3Cpath d='M18 24c0-8 6-14 14-14s14 6 14 14v8l-4 8H22l-4-8v-8Z' fill='%2319b8b0'/%3E%3Cpath d='M20 42h24v6H20Z' fill='%23eef2ff'/%3E%3C/svg%3E"
    />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.172.0/build/three.module.js"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1117;
        --panel: #171a22;
        --panel-2: #1f2430;
        --text: #eef2ff;
        --muted: #a6adbb;
        --accent: #19b8b0;
        --border: #2a3040;
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .layout {
        display: grid;
        grid-template-rows: auto auto 1fr;
        height: 100%;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: end;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: rgba(15, 17, 23, 0.96);
      }

      .title-wrap {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .title {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .controls {
        display: flex;
        gap: 8px;
        min-width: min(520px, 100%);
        justify-self: end;
      }

      .controls select,
      .controls button {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font: inherit;
      }

      .controls button {
        background: var(--accent);
        color: #042624;
        font-weight: 600;
        cursor: pointer;
      }

      .controls select {
        min-width: 280px;
        max-width: 420px;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
        white-space: nowrap;
        align-self: center;
      }

      .asset-strip {
        display: flex;
        gap: 10px;
        padding: 12px 14px;
        overflow-x: auto;
        border-bottom: 1px solid var(--border);
        background: rgba(12, 14, 20, 0.96);
      }

      .asset-tile {
        min-width: 132px;
        max-width: 132px;
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--text);
        text-align: left;
        cursor: pointer;
        transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
      }

      .asset-tile:hover {
        border-color: #3d4962;
        background: #1b2030;
        transform: translateY(-1px);
      }

      .asset-tile.active {
        border-color: var(--accent);
        box-shadow: inset 0 0 0 1px rgba(25, 184, 176, 0.2);
      }

      .asset-thumb {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.22), transparent 40%),
          linear-gradient(145deg, rgba(25, 184, 176, 0.2), rgba(143, 176, 255, 0.12)),
          #11151e;
        position: relative;
        overflow: hidden;
      }

      .asset-thumb::before,
      .asset-thumb::after {
        content: "";
        position: absolute;
        inset: 50% auto auto 50%;
        width: 42px;
        height: 42px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 4px;
        transform-origin: center;
      }

      .asset-thumb::before {
        transform: translate(-50%, -50%) rotate(12deg);
      }

      .asset-thumb::after {
        transform: translate(-50%, -50%) rotate(-14deg) scale(0.75);
        opacity: 0.55;
      }

      .asset-name {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.35;
        min-height: 32px;
        word-break: break-word;
      }

      .asset-meta {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
      }

      .asset-empty {
        padding: 16px 14px;
        color: var(--muted);
        font-size: 12px;
        border-bottom: 1px solid var(--border);
        background: rgba(12, 14, 20, 0.96);
      }

      #viewer {
        position: relative;
        min-height: 0;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .overlay {
        position: absolute;
        left: 16px;
        bottom: 16px;
        max-width: min(420px, calc(100% - 32px));
        padding: 10px 12px;
        background: rgba(23, 26, 34, 0.88);
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 12px;
        line-height: 1.45;
        color: var(--muted);
      }

      .overlay strong {
        color: var(--text);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 860px) {
        .topbar {
          grid-template-columns: 1fr;
        }

        .controls {
          min-width: 0;
          justify-self: stretch;
          flex-wrap: wrap;
        }

        .controls select {
          min-width: 0;
          flex: 1 1 220px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="topbar">
        <div class="title-wrap">
          <div class="title">Codex 3D Asset Viewer</div>
          <div id="subtitle" class="subtitle">Watching generated assets from Codex.</div>
        </div>
        <div class="controls">
          <select id="assetSelect" aria-label="Generated assets">
            <option value="">Scanning generated assets...</option>
          </select>
          <button id="refreshAssetsButton" type="button">Refresh</button>
        </div>
        <div id="status" class="status">Waiting for model</div>
      </div>
      <div id="assetStrip" class="asset-strip hidden"></div>
      <div id="assetEmpty" class="asset-empty hidden">No generated 3D assets found yet. This viewer keeps checking automatically.</div>
      <div id="viewer">
        <div class="overlay">
          <strong id="overlayTitle">No asset selected</strong><br />
          <span id="overlayBody">Generated assets will appear above when they are available.</span>
        </div>
      </div>
    </div>

    <script type="module">
      import * as THREE from "https://unpkg.com/three@0.172.0/build/three.module.js";
      import { OrbitControls } from "https://unpkg.com/three@0.172.0/examples/jsm/controls/OrbitControls.js";
      import { RoomEnvironment } from "https://unpkg.com/three@0.172.0/examples/jsm/environments/RoomEnvironment.js";
      import { GLTFLoader } from "https://unpkg.com/three@0.172.0/examples/jsm/loaders/GLTFLoader.js";
      import { FBXLoader } from "https://unpkg.com/three@0.172.0/examples/jsm/loaders/FBXLoader.js";
      import { OBJLoader } from "https://unpkg.com/three@0.172.0/examples/jsm/loaders/OBJLoader.js";
      import { STLLoader } from "https://unpkg.com/three@0.172.0/examples/jsm/loaders/STLLoader.js";
      import { USDZLoader } from "https://unpkg.com/three@0.172.0/examples/jsm/loaders/USDZLoader.js";

      const container = document.getElementById("viewer");
      const statusEl = document.getElementById("status");
      const subtitleEl = document.getElementById("subtitle");
      const assetSelectEl = document.getElementById("assetSelect");
      const refreshAssetsButtonEl = document.getElementById("refreshAssetsButton");
      const assetStripEl = document.getElementById("assetStrip");
      const assetEmptyEl = document.getElementById("assetEmpty");
      const overlayTitleEl = document.getElementById("overlayTitle");
      const overlayBodyEl = document.getElementById("overlayBody");
      const ASSET_POLL_INTERVAL_MS = 8000;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      container.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0f1117);

      const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 500);
      camera.position.set(2.4, 1.8, 3.2);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0.8, 0);

      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

      scene.add(new THREE.HemisphereLight(0xffffff, 0x1c2436, 1.1));
      const keyLight = new THREE.DirectionalLight(0xffffff, 2.6);
      keyLight.position.set(5, 8, 6);
      scene.add(keyLight);

      const fillLight = new THREE.DirectionalLight(0xbdd7ff, 1.2);
      fillLight.position.set(-5, 4, -6);
      scene.add(fillLight);

      const grid = new THREE.GridHelper(10, 20, 0x2b3447, 0x202734);
      grid.position.y = -0.0001;
      scene.add(grid);

      let currentRoot = null;
      let assets = [];
      let currentAssetPath = "";

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function setSubtitle(message) {
        subtitleEl.textContent = message;
      }

      function resize() {
        const rect = container.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height, false);
        camera.aspect = rect.width / Math.max(rect.height, 1);
        camera.updateProjectionMatrix();
      }

      window.addEventListener("resize", resize);
      resize();

      function clearModel() {
        if (!currentRoot) return;
        scene.remove(currentRoot);
        currentRoot.traverse((node) => {
          if (node.geometry) node.geometry.dispose?.();
          if (node.material) {
            const materials = Array.isArray(node.material) ? node.material : [node.material];
            for (const material of materials) material.dispose?.();
          }
        });
        currentRoot = null;
      }

      function formatBytes(sizeBytes) {
        if (!Number.isFinite(sizeBytes) || sizeBytes <= 0) {
          return "0 B";
        }

        const units = ["B", "KB", "MB", "GB"];
        let value = sizeBytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        return `${value >= 10 || unitIndex === 0 ? value.toFixed(0) : value.toFixed(1)} ${units[unitIndex]}`;
      }

      function formatTimestamp(value) {
        if (!value) {
          return "Unknown date";
        }
        try {
          return new Intl.DateTimeFormat(undefined, {
            day: "2-digit",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
          }).format(new Date(value));
        } catch {
          return "Unknown date";
        }
      }

      function describeAssetCount(count) {
        if (!count) {
          return "Watching generated outputs for the first asset.";
        }
        if (count === 1) {
          return "1 generated asset available. The viewer keeps watching for updates.";
        }
        return `${count} generated assets available. The viewer keeps watching for updates.`;
      }

      function findAssetByPath(modelPath) {
        return assets.find((asset) => asset.modelPath === modelPath) || null;
      }

      function updateOverlay(modelPath) {
        const selectedAsset = findAssetByPath(modelPath);
        if (!selectedAsset) {
          overlayTitleEl.textContent = modelPath ? "Custom asset preview" : "No asset selected";
          overlayBodyEl.textContent = modelPath
            ? "Previewing a direct model link outside the generated asset list."
            : "Generated assets will appear above when they are available.";
          return;
        }

        overlayTitleEl.textContent = selectedAsset.name;
        overlayBodyEl.textContent = `${selectedAsset.format.toUpperCase()} • ${formatBytes(selectedAsset.sizeBytes)} • ${formatTimestamp(selectedAsset.modifiedAt)}`;
      }

      function renderAssetStrip(selectedPath) {
        assetStripEl.replaceChildren();

        if (!assets.length) {
          assetStripEl.classList.add("hidden");
          assetEmptyEl.classList.remove("hidden");
          setSubtitle(describeAssetCount(0));
          return;
        }

        assetEmptyEl.classList.add("hidden");
        assetStripEl.classList.remove("hidden");
        setSubtitle(describeAssetCount(assets.length));

        for (const asset of assets) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "asset-tile";
          if (asset.modelPath === selectedPath) {
            button.classList.add("active");
          }

          const thumb = document.createElement("div");
          thumb.className = "asset-thumb";

          const name = document.createElement("div");
          name.className = "asset-name";
          name.textContent = asset.name;

          const meta = document.createElement("div");
          meta.className = "asset-meta";
          meta.innerHTML = `<span>${asset.format}</span><span>${formatBytes(asset.sizeBytes)}</span>`;

          button.append(thumb, name, meta);
          button.addEventListener("click", () => {
            selectAsset(asset.modelPath);
          });
          assetStripEl.appendChild(button);
        }
      }

      function renderAssetSelect(selectedPath) {
        assetSelectEl.replaceChildren();

        if (!assets.length) {
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "No generated assets yet";
          assetSelectEl.appendChild(option);
          assetSelectEl.disabled = true;
          return;
        }

        assetSelectEl.disabled = false;
        for (const asset of assets) {
          const option = document.createElement("option");
          option.value = asset.modelPath;
          option.textContent = `${asset.name} (${asset.format.toUpperCase()})`;
          assetSelectEl.appendChild(option);
        }

        const optionValues = new Set(assets.map((asset) => asset.modelPath));
        if (selectedPath && !optionValues.has(selectedPath)) {
          const customOption = document.createElement("option");
          customOption.value = selectedPath;
          customOption.textContent = "Current linked asset";
          assetSelectEl.insertBefore(customOption, assetSelectEl.firstChild);
        }

        assetSelectEl.value = selectedPath || assets[0]?.modelPath || "";
      }

      async function fetchAssets() {
        const response = await fetch("/__codex_3d_asset_assets", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("Failed to fetch generated assets.");
        }
        const payload = await response.json();
        return Array.isArray(payload?.assets) ? payload.assets : [];
      }

      async function refreshAssetBrowser(preferredPath = "") {
        try {
          assets = await fetchAssets();
          const nextPath =
            preferredPath ||
            currentAssetPath ||
            new URLSearchParams(window.location.search).get("model") ||
            assets[0]?.modelPath ||
            "";

          renderAssetSelect(nextPath);
          renderAssetStrip(nextPath);
          updateOverlay(nextPath);
          return nextPath;
        } catch (error) {
          console.error(error);
          assetSelectEl.replaceChildren();
          const option = document.createElement("option");
          option.value = "";
          option.textContent = "Failed to load generated assets";
          assetSelectEl.appendChild(option);
          assetSelectEl.disabled = true;
          assetStripEl.classList.add("hidden");
          assetEmptyEl.classList.remove("hidden");
          overlayTitleEl.textContent = "Asset browser unavailable";
          overlayBodyEl.textContent = "The viewer could not fetch the generated asset list.";
          setSubtitle("The generated asset browser could not be refreshed.");
          setStatus("Failed to scan generated assets");
          return preferredPath;
        }
      }

      function frameObject(object3d) {
        const box = new THREE.Box3().setFromObject(object3d);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z, 0.01);
        const distance = maxDim * 1.9;

        controls.target.copy(center);
        camera.position.set(center.x + distance, center.y + distance * 0.55, center.z + distance);
        camera.near = Math.max(maxDim / 100, 0.01);
        camera.far = Math.max(maxDim * 40, 100);
        camera.updateProjectionMatrix();
        controls.update();
      }

      function wrapGeometry(geometry, material) {
        const mesh = new THREE.Mesh(
          geometry,
          material || new THREE.MeshStandardMaterial({ color: 0xc7d2fe, metalness: 0.15, roughness: 0.75 })
        );
        const group = new THREE.Group();
        group.add(mesh);
        return group;
      }

      async function loadModel(path) {
        clearModel();
        currentAssetPath = path;
        updateOverlay(path);
        setStatus(`Loading ${findAssetByPath(path)?.name || "selected asset"}`);

        const cleanPath = path.trim();
        const lower = cleanPath.toLowerCase();

        try {
          let root;

          if (lower.endsWith(".glb") || lower.endsWith(".gltf")) {
            const gltf = await new GLTFLoader().loadAsync(cleanPath);
            root = gltf.scene;
          } else if (lower.endsWith(".fbx")) {
            root = await new FBXLoader().loadAsync(cleanPath);
          } else if (lower.endsWith(".obj")) {
            root = await new OBJLoader().loadAsync(cleanPath);
          } else if (lower.endsWith(".stl")) {
            const geometry = await new STLLoader().loadAsync(cleanPath);
            root = wrapGeometry(geometry);
          } else if (lower.endsWith(".usdz")) {
            root = await new USDZLoader().loadAsync(cleanPath);
          } else {
            throw new Error("Unsupported file format for preview.");
          }

          currentRoot = root;
          scene.add(root);
          frameObject(root);
          setStatus(`Loaded ${findAssetByPath(cleanPath)?.name || "selected asset"}`);
        } catch (error) {
          console.error(error);
          setStatus(`Failed to load model: ${error.message}`);
        }
      }

      function selectAsset(modelPath) {
        if (!modelPath) {
          return;
        }

        const next = new URL(window.location.href);
        next.searchParams.set("model", modelPath);
        window.history.replaceState({}, "", next);
        renderAssetSelect(modelPath);
        renderAssetStrip(modelPath);
        loadModel(modelPath);
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }
      animate();

      const params = new URLSearchParams(window.location.search);
      const initialModel = params.get("model") || "";

      const resolvedInitialModel = await refreshAssetBrowser(initialModel);
      if (resolvedInitialModel) {
        selectAsset(resolvedInitialModel);
      } else {
        setStatus("Waiting for generated assets");
      }

      assetSelectEl.addEventListener("change", () => {
        if (!assetSelectEl.value) {
          return;
        }
        selectAsset(assetSelectEl.value);
      });

      refreshAssetsButtonEl.addEventListener("click", async () => {
        const preservedSelection = currentAssetPath || assetSelectEl.value;
        const nextPath = await refreshAssetBrowser(preservedSelection);
        if (nextPath && nextPath !== currentAssetPath) {
          selectAsset(nextPath);
          return;
        }
        if (nextPath) {
          renderAssetSelect(nextPath);
          renderAssetStrip(nextPath);
          updateOverlay(nextPath);
          setStatus("Generated assets refreshed");
        } else {
          setStatus("Waiting for generated assets");
        }
      });

      window.setInterval(async () => {
        const preservedSelection = currentAssetPath || assetSelectEl.value;
        const previousCount = assets.length;
        const nextPath = await refreshAssetBrowser(preservedSelection);

        if (nextPath && nextPath !== currentAssetPath) {
          selectAsset(nextPath);
          return;
        }

        if (!nextPath) {
          setStatus("Watching for generated assets");
          return;
        }

        renderAssetSelect(nextPath);
        renderAssetStrip(nextPath);
        updateOverlay(nextPath);
        if (assets.length !== previousCount) {
          setStatus(`Asset list updated: ${assets.length} available`);
        }
      }, ASSET_POLL_INTERVAL_MS);
    </script>
  </body>
</html>
